<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Producto — Indra Net</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="bg-atmosphere"></div><div class="bg-noise"></div>
  <div class="bg-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>
  <div class="bg-web"></div>
  <nav class="navbar">
    <a href="/" class="nav-logo"><svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="1" opacity=".2"/><circle cx="16" cy="16" r="8" stroke="currentColor" stroke-width=".8" opacity=".3"/><circle cx="16" cy="16" r="3" fill="currentColor" opacity=".8"/><line x1="16" y1="2" x2="16" y2="30" stroke="currentColor" stroke-width=".6" opacity=".3"/><line x1="2" y1="16" x2="30" y2="16" stroke="currentColor" stroke-width=".6" opacity=".3"/><circle cx="16" cy="2" r="1.5" fill="var(--accent)"/><circle cx="30" cy="16" r="1.5" fill="var(--accent)" opacity=".7"/></svg> Indra Net</a>
    <ul class="nav-links">
      <li><a href="/"><span class="nav-link-text">Tienda</span></a></li>
      <li><button class="nav-cart-btn" onclick="toggleCart()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg><span class="nav-link-text">Carrito</span><span class="cart-count" id="navCartCount">0</span></button></li>
    </ul>
  </nav>
  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
  <aside class="cart-sidebar" id="cartSidebar">
    <div class="cart-header"><h2>Carrito de Compras</h2><button class="cart-close" onclick="toggleCart()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="cart-items" id="cartItems"><div class="cart-empty">Tu carrito está vacío</div></div>
    <div class="cart-footer"><div class="cart-total"><span class="cart-total-label">Total</span><span class="cart-total-value" id="cartTotal">$0,00</span></div><a href="/checkout.html" class="btn btn-primary btn-lg">Ir al Checkout</a></div>
  </aside>

  <main class="main-content">
    <div class="container" id="productContainer" style="padding-top:64px;padding-bottom:64px">
      <p style="color:var(--text-dim);text-align:center;padding:4rem 0">Cargando producto...</p>
    </div>
  </main>
  <footer class="site-footer"><div class="container">&copy; 2025 Indra Net — Todos los nodos conectados.</div></footer>
  <div class="toast-container" id="toastContainer"></div>
  <script src="/static/js/main.js"></script>
  <script>
    let detailQty = 1, currentProduct = null;
    document.addEventListener('DOMContentLoaded', loadProduct);
    async function loadProduct() {
      const slug = new URLSearchParams(location.search).get('slug');
      if (!slug) { location.href = '/'; return; }
      try {
        const r = await fetch(`/api/products/by-slug/${slug}`);
        if (!r.ok) throw new Error(); const p = await r.json(); currentProduct = p;
        document.title = `${p.name} — Indra Net`;
        document.getElementById('productContainer').innerHTML = `
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start">
            <div style="width:100%;aspect-ratio:1;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-xl);display:flex;align-items:center;justify-content:center;overflow:hidden">
              ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover">` : generateProductSVG(p.id)}
            </div>
            <div>
              <a href="/" style="color:var(--text-dim);font-size:.82rem;text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-bottom:24px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>Volver a la Tienda</a>
              <div style="font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin-bottom:24px">${p.category}</div>
              <h1 style="font-size:2rem;font-weight:800;letter-spacing:-.03em;line-height:1.15;margin-bottom:8px">${p.name}</h1>
              <div style="font-size:2rem;font-weight:700;margin-bottom:16px">$${formatPrice(p.price)}</div>
              <p style="color:var(--text-muted);line-height:1.75;margin-bottom:32px">${p.description}</p>
              <div style="display:flex;align-items:center;gap:16px;margin-bottom:32px">
                <span class="card-stock ${p.stock===0?'out':(p.stock<5?'low':'')}" style="font-size:.85rem">${p.stock===0?'Sin stock':(p.stock<5?`Solo quedan ${p.stock}`:`${p.stock} en stock`)}</span>
              </div>
              <div style="display:flex;gap:16px;align-items:center">
                <div style="display:flex;align-items:center;gap:8px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px">
                  <button class="qty-btn" onclick="adjQty(-1)">−</button>
                  <span id="detailQty" style="min-width:32px;text-align:center;font-weight:600">1</span>
                  <button class="qty-btn" onclick="adjQty(1)">+</button>
                </div>
                <button class="btn btn-primary btn-lg" onclick="addProd()" id="addBtn" ${p.stock===0?'disabled style="opacity:.4;cursor:not-allowed"':''}>${p.stock===0?'Sin Stock':'Agregar al Carrito'}</button>
              </div>
            </div>
          </div>`;
      } catch(e) { document.getElementById('productContainer').innerHTML = '<p style="color:var(--danger);text-align:center;padding:4rem 0">Producto no encontrado. <a href="/" style="color:var(--accent)">Volver a la tienda</a></p>'; }
    }
    function adjQty(d) { detailQty = Math.max(1, detailQty + d); document.getElementById('detailQty').textContent = detailQty; }
    function addProd() {
      if (!currentProduct || currentProduct.stock === 0) return;
      for (let i = 0; i < detailQty; i++) addToCart(currentProduct);
      showToast(`${currentProduct.name} ×${detailQty} agregado al carrito`, 'success');
    }
  </script>
</body>
</html>
