# ══════════════════════════════════════════════════════════════
# Indra Net — Cloudflare Pages Configuration
# ══════════════════════════════════════════════════════════════
# Docs: https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name = "indra-net"
compatibility_date = "2024-12-01"
pages_build_output_dir = "public"

# ── D1 Database Binding ──────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "indra-net-db"
database_id = "8ad5415d-125f-497d-b03a-3170b944f3e3" 

[vars]
# ── Environment Variables ────────────────────────────────────
# Non-sensitive variables can be committed safely:
CURRENCY = "UYU"
